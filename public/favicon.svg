<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#080a0f"/>
  <!-- Film frame border -->
  <rect x="3" y="6" width="26" height="20" rx="2" fill="none" stroke="#e5a9a9" stroke-width="1.5"/>
  <!-- Sprocket holes top row -->
  <rect x="5.5" y="3" width="3.5" height="4.5" rx="1" fill="#d4af37"/>
  <rect x="14.25" y="3" width="3.5" height="4.5" rx="1" fill="#d4af37"/>
  <rect x="23" y="3" width="3.5" height="4.5" rx="1" fill="#d4af37"/>
  <!-- Sprocket holes bottom row -->
  <rect x="5.5" y="24.5" width="3.5" height="4.5" rx="1" fill="#d4af37"/>
  <rect x="14.25" y="24.5" width="3.5" height="4.5" rx="1" fill="#d4af37"/>
  <rect x="23" y="24.5" width="3.5" height="4.5" rx="1" fill="#d4af37"/>
  <!-- Play button triangle (rosegold) -->
  <polygon points="12,10.5 12,21.5 22.5,16" fill="#e5a9a9" opacity="0.92"/>
</svg>
